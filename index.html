<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050a12" />
    <meta name="description" content="TCG Playsim — free browser-based trading-card-game playtester. 2–4 players online. playsim.live" />
    <title>TCG Playsim</title>
    <style>
      html, body, #root { height: 100%; margin: 0; background: #050a12; }
      body { font-family: "Crimson Text", Georgia, serif; color: #e8e2d0; overscroll-behavior: none; }
      /* Initial skeleton while JS loads */
      .boot-skeleton {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 12px; background: #050a12; color: #c8a870;
        font-family: Georgia, serif; letter-spacing: .15em;
      }
      .boot-skeleton .mark { font-size: 32px; opacity: .9; animation: floaty 2s ease-in-out infinite; }
      @keyframes floaty { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-4px) } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-skeleton">
        <div class="mark">⚔</div>
        <div>TCG PLAYSIM</div>
        <div style="font-size:10px;opacity:.5">playsim.live — entering the multiverse…</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
