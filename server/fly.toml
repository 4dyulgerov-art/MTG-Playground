# fly.toml — MTG Playground WebSocket relay
#
# NOTE: production currently runs on DigitalOcean (relay.playsim.live), not
# Fly.io. This config is kept for the alternative deploy path. See README.md.
#
# After `fly launch --no-deploy --copy-config`:
#   fly secrets set \
#     SUPABASE_URL=https://YOUR-PROJECT.supabase.co \
#     SUPABASE_JWT_SECRET=<paste from Supabase dashboard>
#   fly deploy
#
# SUPABASE_URL is REQUIRED for ES256/JWKS-based JWT verification — Supabase
# migrated away from HS256-only signing. Omitting it means the relay will
# reject every real client with 401. SUPABASE_JWT_SECRET is the legacy
# fallback (kept for backwards compat — do not remove).
#
# Get values from: Supabase Dashboard → Settings → API.

app = "mtg-relay"           # change to your app name (must be unique on fly.dev)
primary_region = "fra"      # frankfurt — pick one near most users (lhr, iad, sjc, etc.)

[build]

[env]
  PORT = "3001"
  # ALLOWED_ORIGIN = "https://your-vercel-app.vercel.app"   # uncomment after first deploy to lock origin

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false   # keep the relay always-on; sleep would kill all WS connections
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
